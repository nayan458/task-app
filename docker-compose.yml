services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP: auth
    env_file: .env
    environment:
      AUTH_GRPC_URL: 0.0.0.0:50051
      MONGO_URI: mongodb://mongo:27017/taskflow
    depends_on:
      mongo:
        condition: service_healthy
    expose:
      - "50051"

  task-manager:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP: task-manager
    env_file: .env
    environment:
      TASK_GRPC_URL: 0.0.0.0:50052
      MONGO_URI: mongodb://mongo:27017/taskflow
    depends_on:
      mongo:
        condition: service_healthy
    expose:
      - "50052"

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP: api-gateway
    env_file: .env
    environment:
      AUTH_GRPC_URL: auth:50051
      TASK_GRPC_URL: task-manager:50052
    depends_on:
      - auth
      - task-manager
    ports:
      - "3000:3000"

volumes:
  mongo-data:
