syntax = "proto3";

package task;

service TaskService {
  rpc CreateTask(CreateTaskRequest) returns (TaskResponse);
  rpc GetTasks(GetTasksRequest) returns (GetTasksResponse);
  rpc GetTaskById(GetTaskByIdRequest) returns (TaskResponse);
  rpc UpdateTask(UpdateTaskRequest) returns (TaskResponse);
  rpc DeleteTask(DeleteTaskRequest) returns (DeleteTaskResponse);
}

enum TaskStatus {
  TASK_STATUS_UNSPECIFIED = 0;
  TODO = 1;
  IN_PROGRESS = 2;
  DONE = 3;
}

enum TaskPriority {
  TASK_PRIORITY_UNSPECIFIED = 0;
  LOW = 1;
  MEDIUM = 2;
  HIGH = 3;
}

enum SortOrder {
  SORT_ORDER_UNSPECIFIED = 0;
  ASC = 1;
  DESC = 2;
}

message Task {
  string id = 1;
  string title = 2;
  string description = 3;
  TaskStatus status = 4;
  TaskPriority priority = 5;
  string due_date = 6;
  string created_by = 7;
  string created_at = 8;
  string updated_at = 9;
}

message CreateTaskRequest {
  string title = 1;
  string description = 2;
  TaskStatus status = 3;
  TaskPriority priority = 4;
  string due_date = 5;
  string user_id = 6;
}

message GetTasksRequest {
  string user_id = 1;
  int32 page = 2;
  int32 limit = 3;
  optional TaskStatus status = 4;
  optional TaskPriority priority = 5;
  optional string search = 6;
  optional string sort_by = 7;
  optional SortOrder order = 8;
}

message GetTasksResponse {
  repeated Task items = 1;
  int32 total = 2;
  int32 page = 3;
  int32 limit = 4;
}

message GetTaskByIdRequest {
  string id = 1;
  string user_id = 2;
}

message UpdateTaskRequest {
  string id = 1;
  string user_id = 2;
  optional string title = 3;
  optional string description = 4;
  optional TaskStatus status = 5;
  optional TaskPriority priority = 6;
  optional string due_date = 7;
}

message DeleteTaskRequest {
  string id = 1;
  string user_id = 2;
}

message DeleteTaskResponse {
  bool success = 1;
}

message TaskResponse {
  Task task = 1;
}
